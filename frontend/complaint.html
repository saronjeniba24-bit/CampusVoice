<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CampusVoice - Raise Complaint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="complaint-body">
  <div class="container card">
    <h2>Raise a Complaint</h2>
    <form id="complaintForm">
      <!-- Title -->
      <label for="title">Title</label>
      <input type="text" id="title" name="title" placeholder="Enter complaint title" required>

      <!-- Description -->
      <label for="description">Description</label>
      <textarea id="description" name="description" placeholder="Describe the issue..." required></textarea>

      <!-- Category -->
      <label for="category">Category</label>
      <select id="category" name="category" required>
        <option value="">Select Category</option>
        <option value="Hostel">Hostel</option>
        <option value="Library">Library</option>
        <option value="Canteen">Canteen</option>
        <option value="Classroom">Classroom</option>
        <option value="Laboratory">Laboratory</option>
        <option value="Transport">Transport</option>
        <option value="Sports">Sports</option>
        <option value="Administration">Administration</option>
        <option value="Others">Others</option>
      </select>

      <!-- Priority -->
      <label for="priority">Priority</label>
      <select id="priority" name="priority" required>
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
      </select>

      <!-- Identity -->
      <label for="identity">Identity</label>
      <select id="identity" name="identity" required>
        <option value="Named">Reveal</option>
        <option value="Anonymous">Anonymous</option>
      </select>

      <!-- Visibility -->
      <label for="visibility">Visibility</label>
      <select id="visibility" name="visibility" required>
        <option value="Private">Private</option>
        <option value="Public">Public</option>
      </select>

      <button type="submit" class="btn-glow">Submit Complaint</button>
    </form>
  </div>

  <!-- ✅ Only include app.js, no inline script -->
  <script src="js/app.js"></script>
</body>
</html>
