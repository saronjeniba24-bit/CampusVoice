<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CampusVoice - HOD Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">
  <header class="dashboard-header">
    <h1>HOD Dashboard</h1>
    <nav>
      <a href="timeline.html">Complaint Timeline</a>
      <a href="publicboard.html">Public Board</a>
      <a href="login.html" onclick="localStorage.clear()">Logout</a>
    </nav>
  </header>

  <main class="dashboard-main">
    <section class="complaints-list-section">
      <h2>Department Complaints</h2>
      <table id="hod-complaints-table" class="complaints-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>User</th>
            <th>Year</th>
            <th>Category</th>
            <th>Priority</th>
            <th>Text</th>
            <th>Status</th>
            <th>Created At</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <!-- Filled dynamically -->
        </tbody>
      </table>
    </section>
  </main>

  <footer class="dashboard-footer">
    <p>© 2026 CampusVoice</p>
  </footer>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      loadHodComplaints();
    });
  </script>
</body>
</html>
