<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CampusVoice - Public Board</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <h1>🌐 Public Complaints Board</h1>
  <nav class="nav-links">
  <a href="#" id="dashboardLink">Dashboard</a>
  <a href="login.html" onclick="localStorage.clear()">Logout</a>
</nav>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const role = (localStorage.getItem("role") || "").toLowerCase();
let dashboardLink = "dashboard.html"; // default student
if (role === "faculty") dashboardLink = "faculty.html";
else if (role === "hod") dashboardLink = "hod.html";
document.getElementById("dashboardLink").setAttribute("href", dashboardLink);


    if (role) {
      switch (role.toLowerCase()) {
        case "student":
          dashboardLink.href = "dashboard.html";
          break;
        case "faculty":
          dashboardLink.href = "faculty.html";
          break;
        case "hod":
          dashboardLink.href = "hod.html";
          break;
        case "admin":
          dashboardLink.href = "admin.html";
          break;
        default:
          dashboardLink.href = "dashboard.html"; // fallback
      }
    }
  });
</script>
  </header>

  <main class="main-container">
    <div class="filter-bar">
      <label>Sort by: 
        <select id="sortOption">
          <option value="newest">Newest</option>
          <option value="likes">Most Liked</option>
        </select>
      </label>
    </div>
    <div id="public-complaints-container" class="complaints-grid"></div>
  </main>

  <footer class="footer">
    <p>© 2026 CampusVoice</p>
  </footer>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", loadPublicComplaints);
    document.getElementById("sortOption").addEventListener("change", loadPublicComplaints);
  </script>
</body>
</html>
